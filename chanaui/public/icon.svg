      <stop offset="0%" style="stop-color:#00B96B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1890ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B96B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B96B;stop-opacity:0.6" />
